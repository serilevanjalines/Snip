services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: snip
      DB_HOST: db
      DB_PORT: 5432
      PORT: 8080
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snip
    ports:
      - "5433:5432"
